<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a120d"/>
      <stop offset="100%" stop-color="#0e1712"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fbf6a"/>
      <stop offset="100%" stop-color="#22b8a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3fbf6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a120d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Accent line above logo -->
  <rect x="480" y="210" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Logo: "Climb Pakistan" -->
  <text x="600" y="340" font-family="Oswald, Arial, sans-serif" font-size="120" font-weight="700" fill="#f3f7f3" text-anchor="middle" letter-spacing="0.02">
    Climb
    <tspan fill="#3fbf6a"> Pakistan</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="400" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#8ba090" text-anchor="middle" letter-spacing="0.01">
    Sport Climbing in Pakistan
  </text>

  <!-- URL at bottom -->
  <text x="600" y="540" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#62766a" text-anchor="middle">
    climbpakistan.com
  </text>
</svg>
